name: hipster
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  http: ^1.2.1
  flutter_amazon_chime:
    path: ./plugins/flutter_amazon_chime
  permission_handler: ^11.3.1
  share_plus: ^13.2.0
  url_launcher: ^6.3.2
  google_fonts: ^8.1.0
  flutter_svg: ^2.3.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/github.svg
    - assets/linkedin.svg